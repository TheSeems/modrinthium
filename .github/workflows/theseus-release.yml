name: Release App
on:
  workflow_run:
    workflows: ['Build App']
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release App
    # Only for successful builds of a pushed version tag (v*)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    env:
      VERSION_TAG: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Generate updater manifest (updates.json)
        run: |
          VERSION="${VERSION_TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION_TAG}"

          win_exe=$(find artifacts -name 'Modrinthium_*-setup.exe' | head -1)
          mac_tar=$(find artifacts -name 'Modrinthium.app.tar.gz' | head -1)
          lin_appimage=$(find artifacts -name 'Modrinthium_*.AppImage' | head -1)

          for f in "$win_exe" "$mac_tar" "$lin_appimage"; do
            if [ -z "$f" ] || [ ! -f "${f}.sig" ]; then
              echo "::error::Missing updater artifact or signature (is the TAURI_SIGNING_PRIVATE_KEY secret set?): ${f:-<none>}"
              exit 1
            fi
          done

          jq -nc \
            --arg version "$VERSION" \
            --arg pubDate "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg winSig "$(cat "${win_exe}.sig")" --arg winUrl "${BASE}/$(basename "$win_exe")" \
            --arg macSig "$(cat "${mac_tar}.sig")" --arg macUrl "${BASE}/$(basename "$mac_tar")" \
            --arg linSig "$(cat "${lin_appimage}.sig")" --arg linUrl "${BASE}/$(basename "$lin_appimage")" \
            '{
              version: $version,
              pub_date: $pubDate,
              platforms: {
                "darwin-aarch64": { signature: $macSig, url: $macUrl },
                "darwin-x86_64":  { signature: $macSig, url: $macUrl },
                "linux-x86_64":   { signature: $linSig, url: $linUrl },
                "windows-x86_64": { signature: $winSig, url: $winUrl }
              }
            }' > updates.json

          echo "Generated updates.json:"; cat updates.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${VERSION_TAG#v}"
          # Installers (for humans) + updater bundles (for auto-update) + manifest.
          mapfile -t assets < <(find artifacts -type f \( \
            -name 'Modrinthium_*-setup.exe' -o \
            -name 'Modrinthium_*.dmg' -o \
            -name 'Modrinthium_*.AppImage' -o \
            -name 'Modrinthium_*.deb' -o \
            -name 'Modrinthium-*.rpm' -o \
            -name 'Modrinthium.app.tar.gz' \))

          printf 'Attaching:\n'; printf '  %s\n' "${assets[@]}" updates.json

          gh release create "$VERSION_TAG" \
            --repo "${{ github.repository }}" \
            --title "Modrinthium ${VERSION}" \
            --generate-notes \
            updates.json "${assets[@]}"
