name: Release App
on:
  workflow_run:
    workflows: ['Build App']
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release App
    # Only for successful builds of a pushed version tag (v*)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    env:
      VERSION_TAG: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Download build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${VERSION_TAG#v}"
          mapfile -t assets < <(find artifacts -type f \( \
            -name 'Modrinthium_*-setup.exe' -o \
            -name 'Modrinthium_*.dmg' -o \
            -name 'Modrinthium_*.AppImage' -o \
            -name 'Modrinthium_*.deb' -o \
            -name 'Modrinthium-*.rpm' \))

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No installer artifacts found for ${VERSION_TAG}"
            exit 1
          fi

          printf 'Attaching:\n'; printf '  %s\n' "${assets[@]}"

          gh release create "$VERSION_TAG" \
            --repo "${{ github.repository }}" \
            --title "Modrinthium ${VERSION}" \
            --generate-notes \
            "${assets[@]}"
