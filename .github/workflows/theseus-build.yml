name: Build App
on:
  # Push builds are limited to release tags; day-to-day builds are manual
  # (workflow_dispatch) to avoid a costly run on every push to main.
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build (${{ matrix.artifact-target-name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-target-name: universal-apple-darwin
          - platform: windows-latest
            artifact-target-name: x86_64-pc-windows-msvc
          - platform: ubuntu-24.04
            artifact-target-name: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ''
          target: ${{ contains(matrix.platform, 'macos') && 'x86_64-apple-darwin' || '' }}

      - name: Setup mold
        if: contains(matrix.platform, 'ubuntu')
        uses: rui314/setup-mold@v1

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install Linux build dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Dasel
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: TomWright/dasel
          tag: v2.8.1
          extension-matching: disable
          rename-to: ${{ contains(matrix.platform, 'windows') && 'dasel.exe' || 'dasel' }}
          chmod: 0755

      - name: Set application version
        shell: bash
        run: |
          VERSION="$(git describe --tags --always)"
          VERSION="${VERSION#v}"
          # Only an exact version tag yields a release build. Anything else
          # (untagged, or commits past a tag) becomes a numeric canary version:
          # the MSI target rejects non-numeric build metadata like a git hash,
          # and the run number keeps versions monotonic for the auto-updater.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "Setting application version to ${VERSION}"
          dasel put -f apps/app/Cargo.toml -t string -v "${VERSION}" 'package.version'
          dasel put -f packages/app-lib/Cargo.toml -t string -v "${VERSION}" 'package.version'
          dasel put -f apps/app-frontend/package.json -t string -v "${VERSION}" 'version'
          cp packages/app-lib/.env.prod packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        run: pnpm --filter=@modrinth/app run tauri build --config tauri-release.conf.json ${{ contains(matrix.platform, 'macos') && '--target universal-apple-darwin' || '' }}
        env:
          # Installer code-signing is intentionally not configured (unsigned installers).
          # These sign the auto-update artifacts; without the secret the build still
          # succeeds but produces no valid updater signatures.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: App bundle (${{ matrix.artifact-target-name }})
          if-no-files-found: warn
          path: |
            target/release/bundle/appimage/Modrinthium_*.AppImage
            target/release/bundle/appimage/Modrinthium_*.AppImage.tar.gz*
            target/release/bundle/deb/Modrinthium_*.deb
            target/release/bundle/rpm/Modrinthium-*.rpm
            target/release/bundle/nsis/Modrinthium_*-setup.exe
            target/release/bundle/nsis/Modrinthium_*-setup.nsis.zip*
            target/universal-apple-darwin/release/bundle/dmg/Modrinthium_*.dmg
            target/universal-apple-darwin/release/bundle/macos/Modrinthium.app.tar.gz*
