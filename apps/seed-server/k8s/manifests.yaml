# seed-server workloads for the `seed-server` namespace (created by ../.secret/rbac.yaml).
#
# Prerequisites applied separately (they carry secrets, so are NOT in this file):
#   - the SEED_KEY secret        (see secret.example.yaml)
#   - the image pull secret      `registry-theseems` (registry.net.theseems.ru)
#
# Apply:
#   kubectl --kubeconfig ../.secret/seed-admin.kubeconfig apply -f manifests.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seed-server-data
  namespace: seed-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seed-server
  namespace: seed-server
  labels:
    app: seed-server
spec:
  replicas: 1
  # Flat-file storage on a ReadWriteOnce volume: never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seed-server
  template:
    metadata:
      labels:
        app: seed-server
    spec:
      imagePullSecrets:
        - name: registry-theseems
      containers:
        - name: seed-server
          image: registry.net.theseems.ru/modrinthium-seed-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SEED_KEY
              valueFrom:
                secretKeyRef:
                  name: seed-server-secret
                  key: SEED_KEY
            - name: SEED_PUBLIC_URL
              value: https://mrumseed.theseems.ru
            - name: SEED_DATA_DIR
              value: /data
            - name: SEED_BIND
              value: 0.0.0.0:8000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seed-server-data
---
apiVersion: v1
kind: Service
metadata:
  name: seed-server
  namespace: seed-server
  labels:
    app: seed-server
spec:
  selector:
    app: seed-server
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seed-server
  namespace: seed-server
  annotations:
    # mrpack uploads flow through the ingress; the nginx default (1m) is far too small.
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    # TLS is terminated upstream by a front nginx that proxies to this ingress
    # over HTTP, so there is no tls block / cert-manager here. SEED_PUBLIC_URL
    # stays https because that is the public-facing URL the front nginx serves.
spec:
  ingressClassName: nginx-public
  rules:
    - host: mrumseed.theseems.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seed-server
                port:
                  number: 80
