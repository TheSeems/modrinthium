# Copy this to your private secrets location, set a real key, and apply it.
# Do NOT commit the filled-in version.
#
#   cp secret.example.yaml ../.secret/seed-server-secret.yaml
#   # edit SEED_KEY
#   kubectl --kubeconfig ../.secret/seed-admin.kubeconfig apply -f ../.secret/seed-server-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: seed-server-secret
  namespace: seed-server
type: Opaque
stringData:
  # The bearer token required to publish. Use a long random value, e.g. `openssl rand -hex 32`.
  SEED_KEY: "CHANGE-ME-to-a-long-random-secret"
